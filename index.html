<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Anurag</title>
    <style>
        body { background: #111; color: #00f3ff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 2px solid #00f3ff; width: 320px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }
        h2 { text-align: center; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus, textarea:focus { border-color: #00f3ff; }
        button { width: 100%; padding: 12px; background: #00f3ff; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; color: #111; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Contact Me</h2>
        <input type="email" id="userEmail" placeholder="Your Email" required>
        <input type="text" id="subject" placeholder="Subject" required>
        <textarea id="message" rows="4" placeholder="Your Message" required></textarea>
        <button id="sendBtn" onclick="sendMail()">Send to Anurag</button>
    </div>

    <script>
        async function sendMail() {
            const btn = document.getElementById('sendBtn');
            const data = {
                userEmail: document.getElementById('userEmail').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            if(!data.userEmail || !data.message) return alert("Email and Message are required!");

            btn.innerText = "Bhej raha hoon...";
            btn.disabled = true;

            try {
                const response = await fetch('https://testing-jmd2.onrender.com/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert("Message sent! Anurag ko aapka mail mil jayega.");
                    window.location.href = "thankyou.html";
                } else {
                    const errData = await response.json();
                    alert("Failed: " + (errData.message || "Unknown error"));
                    btn.innerText = "Send to Anurag";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Server tak connection nahi ho paya!");
                btn.innerText = "Send to Anurag";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
